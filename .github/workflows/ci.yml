name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  ZIG_VERSION: 0.16.0

jobs:
  # ============================================================
  # Lint & Format Check
  # ============================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Zig fmt check
        run: zig fmt --check src/

  # ============================================================
  # Unit & Integration Tests
  # ============================================================
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install NNG (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnng-dev

      - name: Install NNG (macOS)
        if: runner.os == 'macOS'
        run: brew install nng

      - name: Run tests
        run: zig build test

      - name: Run benchmark (smoke test)
        run: zig build bench

  # ============================================================
  # Cross-Platform Build
  # ============================================================
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            nng_pkg: libnng-dev
          - os: macos-latest
            target: aarch64-macos-none
            nng_pkg: nng
          - os: macos-13
            target: x86_64-macos-none
            nng_pkg: nng
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install NNG (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.nng_pkg }}

      - name: Install NNG (macOS)
        if: runner.os == 'macOS'
        run: brew install ${{ matrix.nng_pkg }}

      - name: Build executable
        run: zig build -Dtarget=${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsdb-${{ matrix.target }}
          path: zig-out/bin/tsdb
          if-no-files-found: error

  # ============================================================
  # Release
  # ============================================================
  release:
    name: Release
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "${dir}tsdb" "release/tsdb-${name}"
            chmod +x "release/tsdb-${name}"
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
